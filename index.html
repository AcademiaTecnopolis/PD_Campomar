<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel Informativo — EFA Campomar</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface":               "#121414",
            "surface-container":     "#1e2020",
            "surface-container-high":"#282a2b",
            "on-surface":            "#e2e2e2",
            "on-surface-variant":    "#becab6",
            "outline-variant":       "#3f4a3b",
            "primary":               "#71de64",
            "tertiary":              "#e7c51d",
            "tertiary-fixed":        "#ffe168",
            "on-tertiary-container": "#221b00",
            /* type accent colours */
            "jornada-accent":  "#4a9ede",
            "visita-accent":   "#4ade80",
            "festiv-accent":   "#e7c51d",
          },
        },
      },
    };
  </script>

  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #121414; font-family: 'Nunito Sans', sans-serif; }

    /* ── SCALER: always fills the viewport keeping 16:9 ── */
    #scaler {
      width: 1920px; height: 1080px;
      transform-origin: top left;
      position: absolute; top: 0; left: 0;
    }

    /* ── BACKGROUNDS ── */
    .bg-layer {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 1.4s ease;
      pointer-events: none;
    }
    .bg-layer.active { opacity: 1; }

    /* Jornada — deep navy */
    #bg-jornada {
      background: linear-gradient(135deg, #03060f 0%, #071530 45%, #0b1e4a 75%, #040c20 100%);
    }
    #bg-jornada::before {
      content:''; position:absolute; inset:0;
      background-image:
        repeating-linear-gradient(0deg,   transparent, transparent 79px, rgba(74,158,222,.05) 80px),
        repeating-linear-gradient(90deg,  transparent, transparent 79px, rgba(74,158,222,.05) 80px),
        repeating-linear-gradient(-45deg, transparent, transparent 119px, rgba(74,158,222,.03) 120px);
    }
    #bg-jornada::after {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 900px 600px at 82% 115%, rgba(74,158,222,.14) 0%, transparent 60%),
        radial-gradient(ellipse 600px 400px at 8% -8%,  rgba(230,197,29,.06)  0%, transparent 50%);
    }

    /* Visita — deep forest green */
    #bg-visita {
      background: linear-gradient(135deg, #020d04 0%, #062910 45%, #083d16 75%, #031507 100%);
    }
    #bg-visita::before {
      content:''; position:absolute; inset:0;
      background-image:
        radial-gradient(circle 1px at 20px 20px, rgba(74,222,128,.15) 1px, transparent 0),
        radial-gradient(circle 1px at 60px 60px, rgba(74,222,128,.08) 1px, transparent 0);
      background-size: 80px 80px;
    }
    #bg-visita::after {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 1000px 500px at 85% 115%, rgba(74,222,128,.13) 0%, transparent 55%),
        radial-gradient(ellipse 500px 500px at -5% 0%,    rgba(230,197,29,.05) 0%, transparent 50%);
    }

    /* Festividad — deep indigo/purple */
    #bg-festividad {
      background: linear-gradient(135deg, #08050f 0%, #160a28 45%, #1e0e38 75%, #0c0618 100%);
    }
    #bg-festividad::before {
      content:''; position:absolute; inset:0;
      background-image:
        radial-gradient(circle 1.5px at 10% 15%,  rgba(231,197,29,.18) 0%, transparent 50%),
        radial-gradient(circle 1px  at 28% 72%,   rgba(231,197,29,.10) 0%, transparent 50%),
        radial-gradient(circle 2px  at 48% 32%,   rgba(231,197,29,.13) 0%, transparent 50%),
        radial-gradient(circle 1px  at 68% 78%,   rgba(231,197,29,.10) 0%, transparent 50%),
        radial-gradient(circle 1.5px at 82% 22%,  rgba(231,197,29,.16) 0%, transparent 50%),
        radial-gradient(circle 1px  at 94% 62%,   rgba(231,197,29,.08) 0%, transparent 50%);
    }
    #bg-festividad::after {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 900px 600px at 82% 115%, rgba(120,60,200,.20) 0%, transparent 55%),
        radial-gradient(ellipse 600px 400px at 5% -5%,   rgba(231,197,29,.07) 0%, transparent 50%);
    }

    /* floating particles for festividad */
    .particle {
      position:absolute; border-radius:50%;
      background: rgba(231,197,29,.55);
      animation: float-up linear infinite;
      pointer-events:none;
    }
    @keyframes float-up {
      0%   { transform:translateY(0) translateX(0); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:.5; }
      100% { transform:translateY(-320px) translateX(var(--dx,20px)); opacity:0; }
    }

    /* ── GLASS ── */
    .glass {
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.13);
    }

    /* ── TYPE BADGE accent bar ── */
    .type-badge-bar { width:5px; border-radius:3px; flex-shrink:0; }

    /* ── TICKER ── */
    .ticker-track { display:inline-flex; white-space:nowrap; align-items:center; }
    .ticker-track.running { animation: ticker-move linear infinite; }
    @keyframes ticker-move {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── COLON BLINK ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .blink { animation: blink 1s step-end infinite; }

    /* ── CARD ENTRANCE ── */
    @keyframes fade-up {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fade-up .7s cubic-bezier(.16,1,.3,1) forwards; opacity:0; }
    .d1 { animation-delay:.15s; }
    .d2 { animation-delay:.30s; }
    .d3 { animation-delay:.45s; }
    .d4 { animation-delay:.60s; }

    /* ── SHIMMER LINE ── */
    .shimmer-line {
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.25) 50%, rgba(255,255,255,0) 100%);
      background-size: 200% 100%;
      animation: shimmer 3s infinite;
    }
    @keyframes shimmer {
      0%   { background-position:-200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── PROGRESS BAR ── */
    #progress-bar {
      position:absolute; bottom:80px; left:0; height:3px;
      background: rgba(231,197,29,.7);
      width:0%; z-index:200;
      transition: width linear;
    }

    /* ── WEATHER ICON MAP ── */
    /* handled in JS via Material Symbols */
  </style>
</head>
<body class="text-on-surface">

<div id="scaler">

  <!-- ══ BACKGROUNDS ══ -->

  <div id="bg-visita"     class="bg-layer"></div>

  <!-- ══ HEADER ══ -->

        <span id="ticker-text-b" style="font-family:Montserrat,sans-serif;font-size:24px;font-weight:700;color:#fff;white-space:nowrap;padding-right:120px;">—</span>

<script>
/* ══════════════════════════════════════════════════════
   CONFIGURACIÓN
══════════════════════════════════════════════════════ */
const CONFIG = {
  SHEET_ID:  '1WFCWXWSx1zO3lEn_W9Ytd2EROyn_-AKegvoxwQTgXXA',
  API_KEY:   'AIzaSyBJMlvMJCFLLfkkK7leS4_6Hi-tHxPv2ho',
  SHEET_TAB: 'Hoja1',
  SLIDE_MS:  10000,       // ms por tarjeta
  REFRESH_MS: 5*60*1000,  // refresco datos
  WEATHER_LAT: 36.7644,
  WEATHER_LON: -2.6148,
};



/* ══ SCALER ══ */
function applyScale() {
  const s = document.getElementById('scaler');
  const scaleX = window.innerWidth  / 1920;
  const scaleY = window.innerHeight / 1080;
  const scale  = Math.min(scaleX, scaleY);
  s.style.transform = `scale(${scale})`;
  // center
  s.style.left = ((window.innerWidth  - 1920 * scale) / 2) + 'px';
  s.style.top  = ((window.innerHeight - 1080 * scale) / 2) + 'px';
}
applyScale();
window.addEventListener('resize', applyScale);

/* ══ TYPE CONFIG ══ */
const TYPES = {
  jornada:    { key:'jornada',    barColor:'#4a9ede', bgColor:'rgba(74,158,222,.15)', textColor:'#7ec8f7', bgId:'bg-jornada',    iconColor:'#7ec8f7', label:'Jornada / Charla' },
  visita:     { key:'visita',     barColor:'#4ade80', bgColor:'rgba(74,222,128,.15)', textColor:'#7ee87a', bgId:'bg-visita',     iconColor:'#7ee87a', label:'Visita' },
  festividad: { key:'festividad', barColor:'#e7c51d', bgColor:'rgba(231,197,29,.15)', textColor:'#ffe168', bgId:'bg-festividad', iconColor:'#ffe168', label:'Festividad / Evento' },
};

function getType(raw) {
  const s = (raw||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (s.includes('jornada')||s.includes('charla')||s.includes('conferencia')) return TYPES.jornada;
  if (s.includes('visita')||s.includes('feria')||s.includes('empresa'))       return TYPES.visita;
  return TYPES.festividad;
}

/* ══ CLOCK ══ */
const DAYS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const MONTHS_SHORT = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

function updateClock() {
  const now = new Date();
  document.getElementById('clock-h').textContent = String(now.getHours()).padStart(2,'0');
  document.getElementById('clock-m').textContent = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-date').textContent =
    `${DAYS[now.getDay()]}, ${now.getDate()} ${MONTHS_SHORT[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ══ WEATHER (Open-Meteo) ══ */
const WMO_MAP = {
  0:  { icon:'wb_sunny',        desc:'Despejado' },
  1:  { icon:'wb_sunny',        desc:'Casi despejado' },
  2:  { icon:'partly_cloudy_day',desc:'Parcialmente nublado' },
  3:  { icon:'cloud',           desc:'Nublado' },
  45: { icon:'foggy',           desc:'Niebla' },
  48: { icon:'foggy',           desc:'Niebla helada' },
  51: { icon:'grain',           desc:'Llovizna leve' },
  61: { icon:'rainy',           desc:'Lluvia leve' },
  63: { icon:'rainy',           desc:'Lluvia moderada' },
  65: { icon:'rainy',           desc:'Lluvia intensa' },
  71: { icon:'ac_unit',         desc:'Nieve leve' },
  80: { icon:'rainy',           desc:'Chubascos' },
  95: { icon:'thunderstorm',    desc:'Tormenta' },
};

async function fetchWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.WEATHER_LAT}&longitude=${CONFIG.WEATHER_LON}&current=temperature_2m,weathercode&timezone=Europe%2FMadrid`;
    const r = await fetch(url);
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const code = d.current.weathercode;
    const info = WMO_MAP[code] || WMO_MAP[0];
    document.getElementById('weather-temp').textContent = `${temp}°C`;
    document.getElementById('weather-desc').textContent = info.desc;
    document.getElementById('weather-icon').textContent = info.icon;
  } catch(e) {
    console.warn('Weather error:', e);
  }
}
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

/* ══ DATE HELPERS ══ */
function parseDate(str) {
  if (!str) return null;
  const p = str.includes('/') ? str.split('/') : str.split('-').reverse();
  if (p.length!==3) return null;
  const [d,m,y] = p.map(Number);
  return new Date(y, m-1, d);
}
function midnight(d) { const x=new Date(d); x.setHours(0,0,0,0); return x; }
function isToday(str) {
  const d=parseDate(str); if(!d) return false;
  return midnight(d).getTime()===midnight(new Date()).getTime();
}
function formatDateLong(str) {
  const d=parseDate(str); if(!d) return str;
  return `${DAYS[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]} de ${d.getFullYear()}`;
}

function selectActive(events) {
  const now = new Date();
  const upcoming = events.filter(e => {
    const d=parseDate(e.fecha); if(!d) return false;
    return now < new Date(midnight(d).getTime()+24*60*60*1000);
  }).sort((a,b)=>parseDate(a.fecha)-parseDate(b.fecha));
  if (!upcoming.length) return [];
  const nextMid = midnight(parseDate(upcoming[0].fecha)).getTime();
  return upcoming.filter(e=>midnight(parseDate(e.fecha)).getTime()===nextMid);
}

function selectNext(events, activeDate) {
  // first event strictly after activeDate
  return events
    .filter(e=>{ const d=parseDate(e.fecha); return d && midnight(d).getTime()>activeDate; })
    .sort((a,b)=>parseDate(a.fecha)-parseDate(b.fecha))[0] || null;
}

/* ══ GOOGLE SHEETS ══ */
async function fetchEvents() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(CONFIG.SHEET_TAB)}?key=${CONFIG.API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  const rows = data.values||[];
  if (rows.length<2) return [];

  const norm = h=>h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  const hdrs = rows[0].map(norm);
  const idx  = name=>hdrs.findIndex(h=>h.includes(name));

  const iId    = idx('id');
  const iTit   = idx('titul');
  const iTipo  = idx('tipo');
  const iFecha = idx('fecha');
  const iHora  = idx('hora');
  const iLugar = idx('lugar');
  const iDir   = idx('dirig');
  const iUlt   = idx('ultima');
  const iMas   = idx('mas') !== -1 ? idx('mas') : idx('informaci');
  const iImg   = idx('imagen');

  return rows.slice(1).map(row=>({
    id:       row[iId]    ||'',
    titulo:   row[iTit]   ||'',
    tipo:     row[iTipo]  ||'',
    fecha:    row[iFecha] ||'',
    hora:     row[iHora]  ||'',
    lugar:    row[iLugar] ||'',
    dirigido: row[iDir]   ||'',
    ultimaHora: iUlt>=0 ? (row[iUlt]||'') : '',
    masInfo:  iMas>=0 ? (row[iMas]||'') : '',
    imagen:   iImg>=0 ? (row[iImg]||'') : '',
  })).filter(e=>e.titulo&&e.fecha);
}

/* ══ BACKGROUND ══ */
function setBg(typeKey) {
  document.querySelectorAll('.bg-layer').forEach(l=>l.classList.remove('active'));
  const tc = TYPES[typeKey]||TYPES.festividad;
  document.getElementById(tc.bgId).classList.add('active');
  // particles only for festividad
  document.querySelectorAll('.particle').forEach(p=>p.remove());
  if (typeKey==='festividad') {
    const bg = document.getElementById('bg-festividad');
    for (let i=0;i<20;i++) {
      const p=document.createElement('div');
      p.className='particle';
      p.style.cssText=`left:${Math.random()*100}%;bottom:${5+Math.random()*25}%;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;animation-duration:${5+Math.random()*9}s;animation-delay:${-Math.random()*9}s;--dx:${(Math.random()-.5)*90}px;opacity:${.3+Math.random()*.5}`;
      bg.appendChild(p);
    }
  }
}

/* ══ RENDER EVENT ══ */
function renderEvent(ev) {
  const tc = getType(ev.tipo);

  // type badge
  document.getElementById('badge-bar').style.background    = tc.barColor;
  document.getElementById('badge-label').textContent        = ev.tipo || tc.label;
  document.getElementById('badge-label').style.background   = tc.bgColor;
  document.getElementById('badge-label').style.color        = tc.textColor;

  // timing badge
  const tb = document.getElementById('timing-badge');
  if (isToday(ev.fecha)) {
    tb.textContent   = '📅 HOY';
    tb.style.color   = '#ffe168';
    tb.style.border  = '1.5px solid rgba(255,225,104,.6)';
    tb.style.background = 'rgba(255,225,104,.1)';
  } else {
    tb.textContent   = '📌 Próximamente';
    tb.style.color   = 'rgba(255,255,255,.55)';
    tb.style.border  = '1.5px solid rgba(255,255,255,.25)';
    tb.style.background = 'transparent';
  }

  // title
  document.getElementById('event-title').textContent = ev.titulo;

  // info card accent colours
  ['icon-fecha','icon-hora','icon-lugar'].forEach(id=>{
    document.getElementById(id).style.color = tc.iconColor;
  });

  document.getElementById('val-fecha').textContent   = formatDateLong(ev.fecha);
  document.getElementById('val-fecha').style.color   = tc.textColor;
  document.getElementById('val-hora').textContent    = ev.hora   || '—';
  document.getElementById('val-hora').style.color    = tc.textColor;
  document.getElementById('val-lugar').textContent   = ev.lugar  || '—';
  document.getElementById('val-dirigido').textContent= ev.dirigido||'—';
  document.getElementById('val-dirigido').style.color= tc.textColor;
  document.getElementById('img-type-label').textContent = (ev.tipo||'Evento').toUpperCase();

  // mas info
  const masPanel = document.getElementById('mas-info-panel');
  const masLabel = document.getElementById('mas-info-label');
  const masVal   = document.getElementById('val-masinfo');
  masLabel.style.color = tc.textColor;
  if (ev.masInfo) {
    masVal.textContent   = ev.masInfo;
    masPanel.style.display = 'block';
  } else {
    masPanel.style.display = 'none';
  }

  // image
  const img         = document.getElementById('event-img');
  const placeholder = document.getElementById('no-image-placeholder');
  if (ev.imagen) {
    img.src           = ev.imagen;
    img.style.display = 'block';
    placeholder.style.display='none';
    img.onerror = ()=>{ img.style.display='none'; placeholder.style.display='flex'; };
  } else {
    img.style.display        = 'none';
    placeholder.style.display= 'flex';
  }

  setBg(tc.key);

  // re-trigger entrance animations
  document.querySelectorAll('.fade-up').forEach(el=>{
    el.style.animation='none';
    void el.offsetWidth;
    el.style.animation='';
  });
}

/* ══ TICKER ══ */
let tickerMode = 'proximos'; // alternates with 'ultimahora'
let tickerInterval = null;
let allEventsCache = [];

function setTickerContent(mode, events) {
  const label = document.getElementById('ticker-label');
  const ta    = document.getElementById('ticker-text-a');
  const tb    = document.getElementById('ticker-text-b');
  const track = document.getElementById('ticker-track');

  let text = '';
  if (mode==='proximos') {
    label.textContent = 'PRÓXIMOS EVENTOS';
    // find next event after active
    const active = selectActive(events);
    const activeDate = active.length ? midnight(parseDate(active[0].fecha)).getTime() : 0;
    const next = selectNext(events, activeDate);
    if (next) {
      text = `${next.titulo}  ·  ${formatDateLong(next.fecha)}`;
    } else if (active.length) {
      text = `${active[0].titulo}  ·  ${formatDateLong(active[0].fecha)}`;
    } else {
      text = 'No hay próximos eventos programados';
    }
  } else {
    label.textContent = 'ÚLTIMA HORA';
    const msgs = events.filter(e=>e.ultimaHora).map(e=>e.ultimaHora);
    text = msgs.length ? msgs.join('  ·  ') : 'Sin novedades';
  }

  // duplicate for seamless loop
  ta.textContent = text;
  tb.textContent = text;

  // reset animation
  track.classList.remove('running');
  void track.offsetWidth;
  // compute duration based on text length
  const dur = Math.max(18, text.length * 0.55);
  track.style.animationDuration = dur + 's';
  track.classList.add('running');
}

function startTickerCycle(events) {
  clearInterval(tickerInterval);
  setTickerContent('proximos', events);
  tickerMode = 'proximos';

  tickerInterval = setInterval(()=>{
    tickerMode = tickerMode==='proximos' ? 'ultimahora' : 'proximos';
    setTickerContent(tickerMode, events);
  }, 15000);
}

/* ══ PROGRESS BAR ══ */
function startProgress(ms) {
  const bar = document.getElementById('progress-bar');
  bar.style.transition='none'; bar.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bar.style.transition=`width ${ms}ms linear`;
    bar.style.width='100%';
  }));
}

/* ══ CAROUSEL ══ */
let carousel = { events:[], current:0, timer:null };

function showSlide(idx) {
  carousel.current = idx % carousel.events.length;
  renderEvent(carousel.events[carousel.current]);
  if (carousel.events.length>1) startProgress(CONFIG.SLIDE_MS);
  else document.getElementById('progress-bar').style.width='0%';
}

function startCarousel(events) {
  carousel.events  = events;
  carousel.current = 0;
  clearInterval(carousel.timer);
  showSlide(0);
  if (events.length>1) {
    carousel.timer = setInterval(()=>showSlide(carousel.current+1), CONFIG.SLIDE_MS);
  }
}

/* ══ STATUS ══ */
function showStatus(icon, title, sub) {
  const s = document.getElementById('status-screen');
  s.innerHTML = `<div style="font-size:64px">${icon}</div>
    <span style="font-family:Montserrat,sans-serif;font-size:32px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.7)">${title}</span>
    <span style="font-size:16px;color:rgba(255,255,255,.35);text-align:center;max-width:600px">${sub}</span>`;
  s.style.display='flex';
}

/* ══ INIT ══ */
async function loadAndRender() {
  try {
    const events = await fetchEvents();
    allEventsCache = events;
    const active  = selectActive(events);

    document.getElementById('status-screen').style.display='none';

    if (!active.length) {
      showStatus('📋','Sin actividades próximas','Cuando se programen nuevas actividades aparecerán aquí.');
      setBg('jornada');
      return;
    }

    startCarousel(active);
    startTickerCycle(events);

  } catch(err) {
    console.error(err);
    showStatus('⚠️','Error al cargar los datos',`No se pudo conectar con Google Sheets.<br><small>${err.message}</small>`);
  }
}

loadAndRender();
setInterval(loadAndRender, CONFIG.REFRESH_MS);

// Day-change watcher
let lastDay = new Date().getDate();
setInterval(()=>{ const d=new Date().getDate(); if(d!==lastDay){lastDay=d;loadAndRender();} }, 60000);
</script>
